{% extends 'base.html' %}

{% block content %}

<h2>Registrar Equipo</h2>

<form method="post" class="card p-4 shadow-sm">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Guardar
    </button>

    <a href="{% url 'lista_equipos' %}" class="btn btn-secondary">
        Cancelar
    </a>

</form>

{% endblock %}
