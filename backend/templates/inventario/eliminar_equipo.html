{% extends 'base.html' %}

{% block content %}

<div class="card shadow p-4">

    <h3 class="text-danger">Eliminar Equipo</h3>

    <p>
        ¿Está seguro de eliminar el equipo
        <strong>{{ equipo.nombre }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button class="btn btn-danger">
            Sí, eliminar
        </button>

        <a href="{% url 'lista_equipos' %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
