{% extends 'base.html' %}

{% block title %}Vincular Biometría - UNEMI{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 mt-5">
            <div class="card-body text-center p-5">
                
                <!-- Icono representativo -->
                <div class="mb-4">
                    <i class="bi bi-fingerprint text-primary" style="font-size: 4rem;"></i>
                </div>

                <h3 class="text-unemi fw-bold mb-3">Seguridad Biométrica</h3>
                <p class="text-muted mb-4">
                    Vincula el lector de huellas o reconocimiento facial de este dispositivo (Windows Hello, TouchID) para acceder al Sistema de Laboratorio rápidamente.
                </p>

                <!-- El Botón de Acción -->
                <button id="btn-registrar-huella" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm">
                    <i class="bi bi-shield-lock me-2"></i> Registrar mi Huella / Rostro
                </button>

                <!-- Mensaje de estado -->
                <div id="mensaje-estado" class="mt-3 fw-medium d-none"></div>

            </div>
        </div>
    </div>
</div>

<!-- Librería que facilita la comunicación con el lector de huellas -->
<script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const btnRegistrar = document.getElementById('btn-registrar-huella');
        const mensajeDiv = document.getElementById('mensaje-estado');
        const { startRegistration } = SimpleWebAuthnBrowser;

        btnRegistrar.addEventListener('click', async () => {
            btnRegistrar.disabled = true;
            btnRegistrar.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Preparando sensor...';
            mensajeDiv.classList.add('d-none');

            try {
                // PASO 1: Pedirle el "reto" a nuestro Django (con credenciales)
                const respReto = await fetch("{% url 'api_generar_reto' %}", { credentials: 'same-origin' });
                const opcionesRegistro = await respReto.json();

                // PASO 2: Despertar a Windows Hello / TouchID
                let respuestaBiometrica;
                try {
                    respuestaBiometrica = await startRegistration(opcionesRegistro);
                } catch (errorSensor) {
                    console.error("Sensor cancelado o no compatible:", errorSensor);
                    mostrarMensaje("Registro cancelado o dispositivo no compatible.", "text-danger");
                    btnRegistrar.disabled = false;
                    btnRegistrar.innerHTML = '<i class="bi bi-shield-lock me-2"></i> Intentar de nuevo';
                    return;
                }

                // PASO 3: Enviar la firma generada de vuelta a Django
                btnRegistrar.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Guardando llave...';
                
                const respVerificacion = await fetch("{% url 'api_verificar_registro' %}", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'same-origin', // Clave para mantener la sesión
                    body: JSON.stringify(respuestaBiometrica)
                });

                const resultadoDB = await respVerificacion.json();

                if (resultadoDB.status === 'ok') {
                    mostrarMensaje("¡Dispositivo vinculado con éxito!", "text-success");
                    btnRegistrar.classList.replace('btn-primary', 'btn-success');
                    btnRegistrar.innerHTML = '<i class="bi bi-check-circle me-2"></i> Vinculación Completada';
                } else {
                    throw new Error(resultadoDB.mensaje);
                }

            } catch (errorGeneral) {
                console.error("Error en el proceso:", errorGeneral);
                // Ahora mostramos el error real enviado por el servidor
                mostrarMensaje("Rechazado por el servidor: " + errorGeneral.message, "text-danger");
                btnRegistrar.disabled = false;
                btnRegistrar.innerHTML = '<i class="bi bi-shield-lock me-2"></i> Intentar de nuevo';
            }
        });

        // Función auxiliar para mostrar alertas
        function mostrarMensaje(texto, claseColor) {
            mensajeDiv.innerText = texto;
            mensajeDiv.className = `mt-3 fw-medium ${claseColor}`;
            mensajeDiv.classList.remove('d-none');
        }
    });
</script>
{% endblock %}
