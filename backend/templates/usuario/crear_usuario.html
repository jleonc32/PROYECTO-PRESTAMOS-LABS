{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Nuevo Usuario</h2>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">
            Guardar
        </button>

        <a href="{% url 'lista_usuarios' %}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

{% endblock %}
