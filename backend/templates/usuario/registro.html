<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4" style="width: 420px; border-radius: 15px; border: none;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Registrarse</h3>
            <p class="text-muted small">Crea tu cuenta para ingresar al sistema</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="mb-3">
                <label class="form-label small fw-semibold text-secondary">{{ field.label }}</label>
                {{ field }}
                
                {% if field.errors %}
                <div class="text-danger xx-small mt-1" style="font-size: 0.8rem;">
                    {{ field.errors|striptags }}
                </div>
                {% endif %}
            </div>
            {% endfor %}

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mt-3">Crear Cuenta</button>
        </form>

        <div class="mt-4 text-center text-muted small">
            ¿Ya tienes una cuenta? <a href="{% url 'login' %}" class="text-decoration-none fw-semibold">Inicia sesión</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('input, select, textarea').forEach(function(elemento) {
            if (elemento.type !== 'checkbox' && elemento.type !== 'radio') {
                elemento.classList.add('form-control');
                elemento.classList.add('py-2');
            }
        });
    </script>
</body>
</html>
