<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso al Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-5 text-center" style="max-width:800px; border-radius:20px;">

        <h2 class="fw-bold mb-4">Sistema de Inventario</h2>

        {% if error %}
        <div class="alert alert-danger">
            {{ error }}
        </div>
        {% endif %}

        <div class="row g-4">

            <!-- ADMINISTRADOR -->
            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-shield-lock-fill text-primary fs-1"></i>
                    <h5 class="mt-3">Administrador</h5>

                    <button class="btn btn-primary w-100 mt-3"
                            onclick="mostrarFormulario('Administrador')">
                        Ingresar
                    </button>
                </div>
            </div>

            <!-- USUARIO -->
            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-person-workspace text-success fs-1"></i>
                    <h5 class="mt-3">Usuario</h5>

                    <button class="btn btn-success w-100 mt-3"
                            onclick="mostrarFormulario('Usuario')">
                        Ingresar
                    </button>
                </div>
            </div>

            <!-- REGISTRO -->
            <div class="col-md-4">
                <div class="p-4 border rounded shadow-sm">
                    <i class="bi bi-person-plus-fill text-warning fs-1"></i>
                    <h5 class="mt-3">Registrarse</h5>

                    <a href="/usuarios/registro/" class="btn btn-warning text-white w-100 mt-3">
                        Crear Cuenta
                    </a>
                </div>
            </div>

        </div>

        <div id="login-form" class="mt-5" style="display:none;">

            <hr>

            <h4 id="titulo-login"></h4>

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <input type="text"
                           name="username"
                           class="form-control"
                           placeholder="Usuario"
                           required>
                </div>

                <div class="mb-3">
                    <input type="password"
                           name="password"
                           class="form-control"
                           placeholder="Contraseña"
                           required>
                </div>

                <button type="submit" class="btn btn-dark w-100">
                    Iniciar sesión
                </button>

            </form>
            <div class="text-center mt-4">
                <p class="text-muted small mb-2">¿Ya vinculaste tu dispositivo?</p>
                <!-- ESTE ES EL ENLACE A TU VISTA DE LOGIN BIOMÉTRICO -->
                <a href="{% url 'login_biometrico' %}" class="btn btn-outline-primary w-100 rounded-pill">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-bounding-box me-2" viewBox="0 0 16 16">
                        <path d="M1.5 1a.5.5 0 0 0-.5.5v3a.5.5 0 0 1-1 0v-3A1.5 1.5 0 0 1 1.5 0h3a.5.5 0 0 1 0 1h-3zM11 .5a.5.5 0 0 1 .5-.5h3A1.5 1.5 0 0 1 16 1.5v3a.5.5 0 0 1-1 0v-3a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 1-.5-.5zM.5 11a.5.5 0 0 1 .5.5v3a.5.5 0 0 0 .5.5h3a.5.5 0 0 1 0 1h-3A1.5 1.5 0 0 1 0 14.5v-3a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v3a1.5 1.5 0 0 1-1.5 1.5h-3a.5.5 0 0 1 0-1h3a.5.5 0 0 0 .5-.5v-3a.5.5 0 0 1 .5-.5z"/>
                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1H3zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/>
                    </svg>
                    Entrar con Huella / Rostro
                </a>
            </div>

        </div>

    </div>
</div>

<script>
function mostrarFormulario(tipo){

    document.getElementById("login-form").style.display="block";

    document.getElementById("titulo-login").innerHTML =
        "Ingreso de " + tipo;

    document.getElementById("login-form").scrollIntoView({
        behavior:"smooth"
    });

}
</script>

</body>
</html>
