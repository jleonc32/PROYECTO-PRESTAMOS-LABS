{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">📊 Estadísticas del Sistema</h2>

    <div class="row">

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Total Equipos</h5>
                    <h2>{{ total_equipos }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Disponibles</h5>
                    <h2>{{ disponibles }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Prestados</h5>
                    <h2>{{ prestados }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Mantenimiento</h5>
                    <h2>{{ mantenimiento }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Usuarios</h5>
                    <h2>{{ total_usuarios }}</h2>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5>Préstamos Activos</h5>
                    <h2>{{ prestamos_activos }}</h2>
                </div>
            </div>
        </div>

    </div>

</div>

{% endblock %}
