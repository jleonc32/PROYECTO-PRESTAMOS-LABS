<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Administrador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
    <div class="container">

        <span class="navbar-brand">
            Sistema de Inventario
        </span>

        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button class="btn btn-danger">
                Cerrar sesión
            </button>
        </form>

    </div>
</nav>


<div class="container mt-5">

    <h2>
        Panel de Administrador
    </h2>

    <p class="text-muted">
        Usuario conectado: {{ user.username }}
    </p>


    <div class="row mt-4">


        <div class="col-md-4">
            <div class="card shadow p-3 text-center">

                <h4>📦 Productos</h4>

                <p>
                    Administrar inventario
                </p>

                <a href="{% url 'lista_equipos' %}" class="btn btn-primary w-100">
                    Entrar
                </a>

            </div>
        </div>



        <div class="col-md-4">
            <div class="card shadow p-3 text-center">

                <h4>👥 Usuarios</h4>

                <p>
                    Gestionar usuarios
                </p>

                <a href="{% url 'lista_usuarios' %}" class="btn btn-success w-100">
                    Entrar
                </a>

            </div>
        </div>



        <div class="col-md-4">
            <div class="card shadow p-3 text-center">

                <h4>📊 Reportes</h4>

                <p>
                    Ver estadísticas
                </p>

                <a href="{% url 'estadisticas' %}" class="btn btn-warning w-100">
                    Entrar
                </a>

            </div>
        </div>


    </div>

</div>


</body>
</html>
